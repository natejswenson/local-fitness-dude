version: 2
updates:
  # Python deps (uv-managed; Dependabot reads pyproject.toml + uv.lock isn't
  # natively supported yet, but pip ecosystem covers the spec ranges).
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  # Frontend deps (pnpm via the npm ecosystem).
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend

  # Container base images.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker

  # GitHub Actions (none yet, but harmless when there are; ready for when
  # we add CI workflows).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
