name: CI

# Treat the agent as code: lint it, test the deterministic core behind a
# coverage gate, and score the prompt. Fails the build if any pillar regresses.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies (incl. dev group)
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Run tests with coverage gate
        run: uv run pytest

      - name: Score the agent prompt
        run: uv run python scripts/score_prompt.py

      # Frontend: type-check + production build. CI does NOT build the Docker
      # image, but this catches TS errors / broken builds before merge.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend (tsc -b && vite build)
        run: |
          corepack enable
          cd web
          pnpm install --frozen-lockfile
          pnpm build
