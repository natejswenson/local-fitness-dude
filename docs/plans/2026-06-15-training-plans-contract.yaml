version: "1.0"
ticket: "#TBD"
title: "Training Plans — goal-driven plan generation, tracking, and daily-brief integration"
date: "2026-06-15"
source: "design"

api_surface:
  agent_tools:
    - name: "get_training_plan_status"
      signature: "get_training_plan_status() -> {active: bool, goal, days_to_race, last_graded_day, today_session, adherence_pct}"
      access: "read-only"
      notes: "Returns {active: false} when no active plan. For the brief, returns STRUCTURED fields only; free-form description is length-capped and fenced as data (anti-injection)."
    - name: "propose_training_plan"
      signature: "propose_training_plan(goal_type: str, race_date: str, target_time_seconds?: int, goal_distance_m?: float, title?: str, ability_snapshot?: object, workouts: object[]) -> {plan_id: int, status: 'draft'}"
      access: "write — draft only"
      notes: "Archives any existing draft. status hardcoded 'draft'. Validates+bounds all inputs before SQL; atomic workout insert."
    - name: "revise_training_plan"
      signature: "revise_training_plan(plan_id: int, goal_type?: str, race_date?: str, target_time_seconds?: int, goal_distance_m?: float, title?: str, workouts?: object[]) -> {plan_id: int, status: 'draft'}"
      access: "write — draft only"
      notes: "Explicit named goal params (NO open fields dict). Never accepts status. Guards target row is status='draft' before writing. Atomic workout replacement."
  rest_endpoints:
    - method: "GET"
      path: "/api/plan"
      returns: "{ active: PlanDetail|null, draft: PlanDetail|null }"
      auth: "bearer (auto via /api/ middleware)"
      notes: "PlanDetail = plan + workouts-with-adherence + weekly mileage series + actual-CTL series + race-day marker + computed Riegel predicted-finish."
    - method: "POST"
      path: "/api/plan/{plan_id:int}/commit"
      returns: "{ plan_id: int, status: 'active' }"
      auth: "bearer"
      errors: "404 if missing, 409 if not draft"
      notes: "BEGIN IMMEDIATE; archives prior active; partial unique index is backstop."
    - method: "DELETE"
      path: "/api/plan/{plan_id:int}"
      returns: "{ plan_id: int, status: 'archived' }"
      auth: "bearer"
      errors: "404 if missing"
      notes: "Soft-delete (archive); history survives."
  frontend_client:
    - "api.plan(): Promise<PlanResponse>"
    - "api.commitPlan(planId: number): Promise<{plan_id:number; status:string}>"
    - "api.deletePlan(planId: number): Promise<{plan_id:number; status:string}>"

invariants:
  checkable:
    - "Only new tables (training_plans, plan_workouts); no ALTER to any existing table; every needed column (incl. seq) in the initial CREATE."
    - "All new REST paths start with /api/ (auth-gated by existing middleware)."
    - "No new path added to RATE_LIMITED_PREFIXES (no new endpoint calls Claude)."
    - "status is never a tool input; propose hardcodes 'draft'; revise editable-column whitelist excludes status/committed_at/plan_id/created_at."
    - "revise guards on the target row being status='draft' before writing."
    - "goal_type and workout type validated against frozen sets; numerics bounded (isfinite/non-negative/ceiling); dates fromisoformat-validated; len(workouts) capped — all before SQL; workout replacement is one transaction."
    - "commit/delete use integer path params and parameterized SQL."
    - "Partial unique index idx_one_active_plan exists on status='active'."
    - "All plan-derived strings (title, description, ability_snapshot) render as escaped React text — no dangerouslySetInnerHTML; CSP script-src 'self' added to security_headers."
    - "No change to Brief/Takeaway schema or the salvage parser; no parallel brief card (plan folds into the existing workout takeaway)."
  testable:
    - "At most one training_plans row has status='active' at any time, including under concurrent commits."
    - "Commit archives the prior active plan atomically; re-commit of a non-draft is rejected (409)."
    - "Type-aware adherence correct across all boundaries (rest-compliant, interval-by-duration, cross-vs-non-running, null-target); days >= data frontier are 'pending' not 'missed'; adherence immune to plan-row edits (derived from activities join)."
    - "The brief emits no plan content with no active plan, and folds the plan into the workout takeaway with one active."
    - "get_training_plan_status returns correct most-recent-graded / today slices relative to db.last_known_daily_date()."
    - "Riegel predicted-finish matches expected value for a known best effort."
    - "Draft-only write guards: revise on an active/archived plan is a no-op error; status can never be set via any tool."

integration_points:
  - "agent/tools.py — add 3 tools to ALL_TOOLS (auto-exposed/allowed via make_server + allowed_tool_names)."
  - "agent/prompts.py — extend briefing_prompt workout-takeaway mandate (merge plan, recovery precedence); add training_plan_prompt() grounding section."
  - "db.py — append training_plans + plan_workouts + indexes to SCHEMA (idempotent CREATE)."
  - "web/server.py — add GET /api/plan, POST /api/plan/{id}/commit, DELETE /api/plan/{id}; add CSP header to security_headers middleware."
  - "web/src — new route /plan + Sidebar item + TrainingPlan.tsx (GoalHeader, PlanCalendarTable, WeeklyMileageChart, FitnessTrajectoryChart, embedded ChatPanel, empty state); api.ts + types.ts additions."
  - "tests/ — unit (adherence, frontier, Riegel, commit, write-guards, validation) + test_security.py cases + plan-quality eval."

ambiguity_resolutions:
  - decision: "Plan rides inside the existing workout takeaway, not a parallel brief card."
    rationale: "Brief is capped at 5 takeaways with workout/steps already required; two 'today's session' mandates would contradict and starve slots. Recovery takes precedence over schedule."
  - decision: "AI write path is draft-only, enforced in code (hardcoded status, named params, status guard) — not by convention."
    rationale: "First agent->SQLite write path; chat + injected user_notes can steer tool calls. Activation/deletion stay human."
  - decision: "Adherence is type-aware and graded off the data frontier (last_known_daily_date), not calendar-today."
    rationale: "Distance-only mis-scores intervals/tempo/cross; Garmin lag would falsely mark synced-late runs as 'missed'."
  - decision: "Trajectory chart ships actual CTL + race-day marker; target CTL ramp cut from v1."
    rationale: "No defensible 'CTL needed for goal time' model; a made-up ramp implies false precision. Adherence % + planned-vs-actual mileage carry on-track signal."
  - decision: "Riegel predicted-finish promoted into v1 (computed, recomputed per GET /api/plan); ability_snapshot is supplementary color."
    rationale: "The on-track number is computable from existing activity columns; a frozen AI prose estimate goes stale and is unfalsifiable."
  - decision: "get_training_plan tool cut."
    rationale: "Gold-plating — the model already has the draft it authored in-session; get_training_plan_status covers the rest."

security_review:
  required: true
  deployment_context: "intranet"
  notes: "Siege + red-team pass completed at anchor 8b35e2c. 4 Critical + 6 High closed at design level. Residual: 0 Critical/High. Threat model in design doc §10."
